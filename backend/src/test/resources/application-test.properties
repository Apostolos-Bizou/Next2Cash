# ═══════════════════════════════════════════════════════════════════
# Next2Cash - TEST profile configuration
# Activated automatically by @ActiveProfiles("test") on test classes
# Uses H2 in-memory database (no PostgreSQL required for tests)
# ═══════════════════════════════════════════════════════════════════

# ─── H2 in-memory database ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:next2cash_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ───────────────────────────────────────────────
# create-drop: schema created at startup, dropped at shutdown (clean state per run)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── JWT (test-only secret, 64 bytes base64) ───────────────────────
# This secret is for tests ONLY. Never used in production.
next2cash.jwt.secret=VGVzdE9ubHlTZWNyZXRGb3JJbnRlZ3JhdGlvblRlc3RzTmV2ZXJVc2VJblByb2R1Y3Rpb24xMjM0NTY3ODkwYWJjZGVmPT0=
next2cash.jwt.expiration-ms=3600000

# ─── CORS ──────────────────────────────────────────────────────────
next2cash.cors.allowed-origins=http://localhost:3000

# ─── Azure Blob Storage (stubbed for tests) ────────────────────────
# Tests should mock Blob storage; these dummy values prevent startup failure
azure.storage.connection-string=DefaultEndpointsProtocol=https;AccountName=testaccount;AccountKey=dGVzdGtleQ==;EndpointSuffix=core.windows.net
azure.storage.container-name=test-container

# ─── Logging ───────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.com.next2me=INFO
logging.level.org.hibernate.SQL=WARN