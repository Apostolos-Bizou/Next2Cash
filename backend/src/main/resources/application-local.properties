# Next2Cash - LOCAL DEVELOPMENT profile
# Activated via: -Dspring-boot.run.profiles=local  or  --spring.profiles.active=local
# Overrides ONLY values that need to change for local execution.
# All other settings are inherited from application.properties.

# Local server port (instead of 80 used by Azure App Service)
server.port=8080

# More verbose logging for local debugging
logging.level.com.next2me=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.web=INFO

# Disable lazy initialization locally so startup errors surface immediately
spring.main.lazy-initialization=false
