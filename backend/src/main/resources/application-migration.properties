# ============================================================
# Migration profile — activated by --spring.profiles.active=migration
# ============================================================
# Purpose: Run BlobMigrationService as a one-shot CLI command without
# starting the web server. Auto-exits after CommandLineRunner completes.
#
# Usage:
#   mvn spring-boot:run "-Dspring-boot.run.arguments=--spring.profiles.active=migration --migration.dry-run=true"
#
# DB connection inherits from application.properties (production PostgreSQL).
# All queries are READ-ONLY — no writes, no network I/O to Drive/Azure.
# ============================================================

# Disable web server — we don't need Tomcat for a CLI command
spring.main.web-application-type=none

# Ensure the app shuts down cleanly after CommandLineRunner completes
spring.main.register-shutdown-hook=true

# Reduce noise during CLI execution
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Keep migration service logs visible
logging.level.com.next2me.next2cash.service.migration=INFO

# ============================================================
# GCP Drive API credentials (Session #31 - migration pilot)
# ============================================================
# Path to the service account JSON key. Relative to the working directory
# where Maven/Spring Boot is launched (i.e. the backend folder).
# NEVER commit this file - it is in .gitignore under backend/credentials/
migration.gcp.credentials-path=credentials/gcp-service-account.json

# Safety switch: set to false to disable DriveDownloadService initialization
# (useful if credentials are missing and we want to run other migration tasks)
migration.gcp.enabled=true
# ============================================================
# Azure Blob Storage (Session #31 - migration pilot)
# ============================================================
# The connection string is inherited from the production property
# next2cash.azure.blob.connection-string (NEXT2CASH_AZURE_BLOB_CONNECTION_STRING env var).
# For local runs, set the env var in your PowerShell session before running:
#   az storage account show-connection-string --name next2cashdocs --resource-group next2cash-rg --query connectionString -o tsv
# Then: $env:NEXT2CASH_AZURE_BLOB_CONNECTION_STRING = <paste>
#
# Safety switch: set to false to disable AzureBlobUploadService initialization
migration.azure.enabled=true