# ============================================================
# Migration profile — activated by --spring.profiles.active=migration
# ============================================================
# Purpose: Run BlobMigrationService as a one-shot CLI command without
# starting the web server. Auto-exits after CommandLineRunner completes.
#
# Usage:
#   mvn spring-boot:run "-Dspring-boot.run.arguments=--spring.profiles.active=migration --migration.dry-run=true"
#
# DB connection inherits from application.properties (production PostgreSQL).
# All queries are READ-ONLY — no writes, no network I/O to Drive/Azure.
# ============================================================

# Disable web server — we don't need Tomcat for a CLI command
spring.main.web-application-type=none

# Ensure the app shuts down cleanly after CommandLineRunner completes
spring.main.register-shutdown-hook=true

# Reduce noise during CLI execution
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Keep migration service logs visible
logging.level.com.next2me.next2cash.service.migration=INFO
