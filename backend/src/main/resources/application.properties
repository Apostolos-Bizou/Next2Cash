# Next2Cash Backend Configuration

# Database - Azure PostgreSQL
spring.datasource.url=jdbc:postgresql://next2cash-db.postgres.database.azure.com:5432/next2cash?sslmode=require
spring.datasource.username=next2cash_admin
spring.datasource.password=Next2Cash@2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
next2cash.jwt.secret=Next2CashJWTSecretKey2026Next2meGroupSecureToken
next2cash.jwt.expiration=28800000

# Azure Blob Storage
next2cash.azure.blob.connection-string=USE_AZURE_APP_SETTINGS
next2cash.azure.blob.container=next2cash-documents

# CORS
next2cash.cors.allowed-origins=https://www.next2cash.com,https://next2cash.com,https://lively-desert-00a1c4610.7.azurestaticapps.net,http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.next2me=DEBUG
logging.level.org.springframework.security=INFO

# Server
server.port=80

spring.main.lazy-initialization=true
